# Auto-deploy to VPS on push to main.
#
# Connects via SSH and updates scripts, systemd units, CLAUDE.md templates,
# and skills on the VPS. No interactive prompts -- install.sh is NOT called.
#
# Required GitHub Secrets:
#   VPS_SSH_KEY   - Private SSH key for VPS access
#   VPS_HOST      - VPS hostname or IP address
#   VPS_USER      - SSH username on VPS
#   VPS_SSH_PASSPHRASE - Passphrase for SSH key (if key is encrypted)
#   VPS_REPO_PATH - Path to repo clone on VPS (default: ~/claude-restart)

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          eval "$(ssh-agent -a $SSH_AUTH_SOCK)"
          echo "${{ secrets.VPS_SSH_PASSPHRASE }}" | SSH_ASKPASS_REQUIRE=force SSH_ASKPASS=/bin/cat ssh-add ~/.ssh/deploy_key
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'DEPLOY'
            set -euo pipefail
            REPO="${HOME}/claude-restart"

            # Pull latest code
            cd "$REPO"
            git pull origin main

            # Copy scripts to ~/.local/bin
            cp bin/claude-wrapper bin/claude-restart bin/claude-service ~/.local/bin/
            chmod +x ~/.local/bin/claude-wrapper ~/.local/bin/claude-restart ~/.local/bin/claude-service

            # Copy systemd units and reload
            cp systemd/claude@.service systemd/claude-watchdog@.service systemd/claude-watchdog@.timer ~/.config/systemd/user/
            systemctl --user daemon-reload

            # Re-deploy CLAUDE.md templates and skills
            claude-service update --all

            echo "Deploy complete."
          DEPLOY
